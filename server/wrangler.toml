name = "wroom-api"
main = "src/index.ts"
compatibility_date = "2025-07-18"
compatibility_flags = ["nodejs_compat"]

# D1 database binding. Create the database with:
#   npx wrangler d1 create wroom
# then paste the returned database_id below (it is not a secret).
[[d1_databases]]
binding = "DB"
database_name = "wroom"
database_id = "61213580-09df-41fe-9019-ab91b2594807"
migrations_dir = "migrations"

# Serve the built web app (../dist) from this same Worker, so the app and API
# share one origin — the session cookie (SameSite=Lax) then works with no CORS.
# The Worker runs first for /api/* and the public /privacy page; everything else
# serves static assets, falling back to index.html for client-side routes (SPA).
[assets]
directory = "../dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/privacy", "/delete-account"]

[vars]
# Comma-separated list of origins allowed to call the API with credentials.
# Add your deployed web origin (and Capacitor origins) before launch.
# capacitor://localhost and http://localhost cover the iOS app + local dev.
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:4173,capacitor://localhost,ionic://localhost"

# Secrets (NOT set here). Set with:
#   npx wrangler secret put SESSION_SECRET
# For local dev, put it in server/.dev.vars (gitignored).
#
# In-app feature-request form (POST /api/feedback) files GitHub issues. Set:
#   npx wrangler secret put GITHUB_TOKEN   # fine-grained PAT with Issues: write
#   npx wrangler secret put GITHUB_REPO    # e.g. "JYoussouf/wroom"
# Locally, add GITHUB_TOKEN and GITHUB_REPO to server/.dev.vars.

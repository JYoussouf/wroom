<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="capSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfcfcf"/>
      <stop offset="1" stop-color="#9a9a9a"/>
    </linearGradient>
    <linearGradient id="capTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ececec"/>
    </linearGradient>
  </defs>

  <!-- full-bleed keycap: the side/bevel fills the whole icon (OS masks the corners) -->
  <rect width="512" height="512" fill="url(#capSide)"/>

  <!-- raised top face -->
  <rect x="40" y="36" width="432" height="432" rx="80" fill="url(#capTop)"/>

  <!-- pencil resting diagonally on the keycap (same drawing, scaled to fill the larger cap) -->
  <g transform="translate(253 260) scale(1.7) translate(-253 -260)">
    <g transform="rotate(-38 256 260)">
      <rect x="180" y="240" width="140" height="40" rx="4" fill="#f7f3ec"/>
      <rect x="320" y="240" width="14" height="40" fill="#b9b2a8"/>
      <rect x="334" y="240" width="26" height="40" rx="9" fill="#e7a98c"/>
      <path d="M180 240 L146 260 L180 280 Z" fill="#e9c98f"/>
      <path d="M160 251 L146 260 L160 269 Z" fill="#241f1c"/>
    </g>
  </g>
</svg>
